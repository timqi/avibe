          --- a/run-command.c
          +++ b/run-command.c
          @@ -680,6 +680,18 @@
                   int fdin[2], fdout[2], fderr[2];
                   int failed_errno;
                   const char *str;
          +
          +        if (!cmd->git_cmd) {
