          +                "receive-pack", "remote", "remote-ext", "remote-fd",
          +                "request-pull", "send-email", "send-pack", "submodule", "upload-archive",
          +                "upload-pack",
          +        };
          +        int maintenance_auto = 0;
          +
          +        if (!strcmp(command, "maintenance")) {
          +                for (int i = 1; i < argc; i++) {
