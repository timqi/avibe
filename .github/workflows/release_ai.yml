name: Release (AI Notes)

on:
  push:
    tags:
      - "v*"
      - "gh-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g., v1.0.0, v1.0.1rc1, or gh-v1.0.1rc1)"
        required: true
        type: string
      model:
        description: "OpenAI model (default: gpt-5.5)"
        required: false
        type: string
        default: "gpt-5.5"
      max_commits:
        description: "Max commits to summarize"
        required: false
        type: string
        default: "200"

permissions:
  contents: write
  pull-requests: read

jobs:
  resolve-show-runtime-ref:
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.ref.outputs.ref }}
    steps:
      - name: Resolve Show Runtime ref
        id: ref
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          REF=$(gh api repos/avibe-bot/vibe-show-runtime/commits/main --jq '.sha')
          if [ -z "$REF" ]; then
            echo "Failed to resolve avibe-bot/vibe-show-runtime main" >&2
            exit 1
          fi
          echo "ref=$REF" >> "$GITHUB_OUTPUT"

  show-runtime-bundles:
    needs: resolve-show-runtime-ref
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: linux-x64
          - os: ubuntu-24.04-arm
            artifact: linux-arm64
          - os: macos-15-intel
            artifact: darwin-x64
          - os: macos-14
            artifact: darwin-arm64
          - os: windows-latest
            artifact: win32-x64
          - os: windows-11-arm
            artifact: win32-arm64
    steps:
      - name: Checkout Show Runtime
        uses: actions/checkout@v5
        with:
          repository: avibe-bot/vibe-show-runtime
          ref: ${{ needs.resolve-show-runtime-ref.outputs.ref }}
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22.14.0"
          cache: "npm"
      - name: Build Show Runtime bundle
        run: |
          npm ci
          npm run build
          npm run bundle:vibe-remote
          cp dist/vibe-show-runtime-node-*.tgz .
          git rev-parse HEAD > show-runtime-ref-${{ matrix.artifact }}.txt
      - name: Upload Show Runtime bundle
        uses: actions/upload-artifact@v6
        with:
          name: show-runtime-${{ matrix.artifact }}
          path: |
            vibe-show-runtime-node-*.tgz
            show-runtime-ref-${{ matrix.artifact }}.txt

  build-assets:
    needs: show-runtime-bundles
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22.14.0"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - name: Build UI
        working-directory: ui
        run: |
          npm ci
          npm run build

      - name: Download Show Runtime bundles
        uses: actions/download-artifact@v6
        with:
          pattern: show-runtime-*
          path: runtime-artifacts
          merge-multiple: true

      - name: Generate Show Runtime manifest
        run: |
          python scripts/generate_show_runtime_manifest.py \
            --archive-dir runtime-artifacts \
            --tag "${{ github.event.inputs.tag || github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --runtime-ref-file 'runtime-artifacts/show-runtime-ref-*.txt' \
            --output vibe/show_runtime_manifest.json

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build Python package
        run: |
          pip install build
          python -m build

      - name: Verify bundled Show Runtime archives
        run: |
          python - <<'PY'
          import sys
          import zipfile
          from pathlib import Path

          wheels = sorted(Path("dist").glob("*.whl"))
          if len(wheels) != 1:
              raise SystemExit(f"Expected exactly one wheel, found {len(wheels)}")

          with zipfile.ZipFile(wheels[0]) as wheel:
              names = set(wheel.namelist())
              archives = {
                  name for name in names
                  if name.startswith("vibe/show_runtime/") and name.endswith(".tgz")
              }

          if archives:
              raise SystemExit("Wheel unexpectedly contains Show Runtime archives:\n" + "\n".join(sorted(archives)))
          if "vibe/show_runtime_manifest.json" not in names:
              raise SystemExit("Wheel is missing vibe/show_runtime_manifest.json")

          print("vibe/show_runtime_manifest.json")
          PY

      - name: Add Show Runtime release assets
        shell: bash
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          if [[ "$TAG" == gh-v* ]]; then
            cp runtime-artifacts/vibe-show-runtime-node-*.tgz dist/
            cp vibe/show_runtime_manifest.json dist/show-runtime-manifest.json
          else
            echo "Show Runtime release assets for $TAG are produced by the PyPI publish workflow."
          fi

      - name: Upload release artifacts
        uses: actions/upload-artifact@v6
        with:
          name: release-dist
          path: dist/

  release:
    needs: build-assets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          if [ -z "$TAG" ]; then
            echo "Tag is empty" >&2
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Classify release type
        id: release_type
        shell: bash
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          PRERELEASE="false"

          if [[ "$TAG" == *-* ]]; then
            PRERELEASE="true"
          elif [[ "$TAG" =~ ^v[0-9]+(\.[0-9]+)*(([.-])?(a|b|rc|dev)[0-9]+)$ ]]; then
            PRERELEASE="true"
          fi

          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"

      - name: Compute previous tag
        id: prev
        shell: bash
        run: |
          TAG="${{ steps.tag.outputs.tag }}"

          if [[ "$TAG" == gh-v* ]]; then
            if ! git rev-parse --verify "$TAG^{commit}" >/dev/null 2>&1; then
              echo "Current tag '$TAG' not found in git tags" >&2
              git tag -l '*v*' --sort=v:refname | tail -n 50 >&2
              exit 1
            fi
            PREV=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || true)
            echo "prev=$PREV" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Find the previous semantic version tag (v*) before current tag.
          # This assumes tags follow semver-like ordering.
          PREV=""
          FOUND="false"
          while IFS= read -r t; do
            if [ "$t" = "$TAG" ]; then
              FOUND="true"
              break
            fi
            PREV="$t"
          done < <(git tag -l 'v*' --sort=v:refname)

          if [ "$FOUND" != "true" ]; then
            echo "Current tag '$TAG' not found in git tags" >&2
            git tag -l 'v*' --sort=v:refname | tail -n 50 >&2
            exit 1
          fi

          echo "prev=$PREV" >> "$GITHUB_OUTPUT"

      - name: Collect commits
        id: commits
        shell: bash
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          PREV="${{ steps.prev.outputs.prev }}"

          # workflow_dispatch input is string, keep it robust.
          MAX_COMMITS="${{ github.event.inputs.max_commits }}"
          if [ -z "$MAX_COMMITS" ]; then
            MAX_COMMITS="200"
          fi

          if [ -z "$PREV" ]; then
            RANGE="$TAG"
            echo "No previous tag found. Summarizing commits reachable by $TAG (limited)."
            git log --no-merges --pretty=format:'- %h %s' "$TAG" -n "$MAX_COMMITS" > commits.txt
          else
            RANGE="$PREV..$TAG"
            git log --no-merges --pretty=format:'- %h %s' "$RANGE" -n "$MAX_COMMITS" > commits.txt
          fi

          echo "range=$RANGE" >> "$GITHUB_OUTPUT"

          COUNT=$(wc -l < commits.txt | tr -d ' ')
          echo "commit_count=$COUNT" >> "$GITHUB_OUTPUT"

          # Best-effort: extract PR numbers.
          # - Squash merge style: "... (#123)"
          # - Merge commit style: "Merge pull request #123 from ..."
          : > prs.txt
          perl -ne 'while (/\(#(\d+)\)/g) { print "$1\n" }' commits.txt >> prs.txt || true

          if [ -n "$RANGE" ]; then
            git log --first-parent --merges --pretty=format:'%s' "$RANGE" \
              | perl -ne 'while (/Merge pull request #(\d+)/g) { print "$1\n" }' \
              >> prs.txt || true
          fi

          sort -u prs.txt -o prs.txt || true

          PR_COUNT=$(wc -l < prs.txt | tr -d ' ')
          echo "pr_count=$PR_COUNT" >> "$GITHUB_OUTPUT"

          echo "Commit count: $COUNT"
          echo "PR references found: $PR_COUNT"
          if [ "$COUNT" = "0" ]; then
            echo "No commits found in range $RANGE" >&2
          fi

      - name: Generate release notes (OpenAI)
        id: notes
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ github.event.inputs.model || 'gpt-5.5' }}
          TAG: ${{ steps.tag.outputs.tag }}
          RANGE: ${{ steps.commits.outputs.range }}
          COMMIT_COUNT: ${{ steps.commits.outputs.commit_count }}
          PR_COUNT: ${{ steps.commits.outputs.pr_count }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "Missing OPENAI_API_KEY secret" >&2
            exit 1
          fi

          if ! command -v jq >/dev/null 2>&1; then
            echo "jq is required but not installed on runner" >&2
            exit 1
          fi

          if [[ "$RANGE" == *".."* ]]; then
            COMPARE_PATH="${RANGE/../...}"
            COMPARE_URL="https://github.com/${REPO}/compare/${COMPARE_PATH}"
          else
            COMPARE_URL="https://github.com/${REPO}/commits/${TAG}"
          fi

          # Best-effort PR enrichment: fetch PR title + labels + a short body
          # excerpt ("intent") so the model understands WHY each change shipped,
          # not just the one-line title. The excerpt is newline-flattened and
          # length-capped to keep the prompt bounded.
          PRS_SUMMARY=""
          if [ -s prs.txt ] && command -v gh >/dev/null 2>&1; then
            : > prs_summary.txt
            # Hard limit to avoid rate/time blowups
            head -n 80 prs.txt | while read -r pr; do
              [ -z "$pr" ] && continue
              gh api -H "Accept: application/vnd.github+json" "repos/${REPO}/pulls/${pr}" \
                --jq '"- #\(.number) \(.title) (@\(.user.login))"
                  + (if (.labels|length) > 0 then " [" + ([.labels[].name]|join(", ")) + "]" else "" end)
                  + ((.body // "") | gsub("\r";"") | gsub("\n";" ") | gsub("  +";" ") | .[0:600] | if . == "" then "" else "\n  intent: " + . end)' \
                >> prs_summary.txt || true
            done
            if [ -s prs_summary.txt ]; then
              PRS_SUMMARY=$(cat prs_summary.txt)
            fi
          fi

          # Always pass full commits as primary source; PRs supplement context.
          COMMITS=$(cat commits.txt 2>/dev/null || true)

          cat > prompt.txt <<PROMPT
          You are writing the GitHub Release Notes (Markdown) for ${REPO} ${TAG}.

          ## What this product is (frame the highlights in these terms)
          Avibe is a local-first "Agent OS": one install turns a machine into the runtime an AI agent lives in, operated through a Web workbench and IM surfaces (Slack, Discord, Telegram, Feishu/Lark, WeChat), routing across multiple agent backends (Claude Code, Codex, OpenCode). The readers are developers and power users running their own Avibe — write for someone deciding whether this upgrade is worth installing.

          ## How to read the input
          - Commits are the PRIMARY source of truth for WHAT shipped. PR titles, labels, and the "intent:" excerpts explain WHY — use them to understand and group, never to invent.
          - SYNTHESIZE THEMES, do not transcribe. Many commits usually serve one user-facing change (e.g. a dozen "fix(im): ..." commits hardening one capability = ONE highlight about that capability, not a dozen bullets). Find the few themes that actually matter to a user and lead with the biggest.
          - Do NOT hallucinate. Use only the provided data. When unsure whether something is user-facing, put it in Changes, not Highlights.

          ## Highlights (the part people actually read)
          Write a ## Highlights section (2-4 bullets) that answers "why should I upgrade?":
          - Lead with the single most impactful change.
          - Each bullet states the concrete, user-visible behavior AND why it matters. Action-oriented: "You can now ...", "X now works without ...", "Fixed a case where ...".
          - Translate significant-but-technical work into the user benefit (what they can now do, or what no longer breaks).
          - Keep internal refactors, CI, and dependency bumps OUT of Highlights.
          - Omit Highlights entirely only if the release is purely internal housekeeping.

          ## Changes
          Group the remaining items under ### Added / ### Changed / ### Fixed / ### Security / ### Breaking (omit empty groups).
          - One line per bullet, start with a verb, reference the PR number when available.
          - Collapse minor/internal items (deps, CI, refactor) into a single "Internal" bullet, or omit them.

          ## Format
          - Output MUST be bilingual, in EXACTLY this order:
            1) English release notes
            2) a single Markdown horizontal rule: ---
            3) Chinese release notes
          - The Chinese version must read like a human engineer wrote it, NOT a machine translation: natural and concise, no translationese, no filler buzzwords, at most one em-dash per section. Convey the same meaning rather than mirroring the English word for word.
          - End each language section with a final line: **Full Changelog**: ${COMPARE_URL}

          Context: ${REPO} ${RANGE}
          PROMPT

          if [ -n "$PRS_SUMMARY" ]; then
            printf '\nPull Requests:\n%s\n' "$PRS_SUMMARY" >> prompt.txt
          fi
          printf '\nCommits (%s):\n%s\n' "$COMMIT_COUNT" "$COMMITS" >> prompt.txt

          jq -n \
            --arg model "$OPENAI_MODEL" \
            --rawfile prompt prompt.txt \
            '{
              model: $model,
              messages: [
                {role: "system", content: "You are a senior developer-relations writer for a developer tool. You read commit logs and PR intent, synthesize them into the few themes that matter to users, and write release notes developers actually want to read: lead with impact, be specific and concrete, never invent changes. When asked for Chinese, you write natural, idiomatic Chinese — never machine-translated."},
                {role: "user", content: $prompt}
              ]
            }' > request.json

          HTTP_CODE=$(curl -sS -w '%{http_code}' \
            --connect-timeout 30 \
            --max-time 300 \
            --retry 2 \
            --retry-delay 10 \
            --retry-max-time 660 \
            -H "Authorization: Bearer ${OPENAI_API_KEY}" \
            -H "Content-Type: application/json" \
            -d @request.json \
            -o response.json \
            https://api.openai.com/v1/chat/completions)

          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "OpenAI API returned HTTP $HTTP_CODE" >&2
            cat response.json >&2 || true
            exit 1
          fi

          ERROR_MSG=$(jq -r '.error.message // empty' response.json)
          if [ -n "$ERROR_MSG" ]; then
            echo "OpenAI API error: $ERROR_MSG" >&2
            jq -r '.error' response.json >&2 || true
            exit 1
          fi

          jq -r '.choices[0].message.content // empty' response.json > release.md

          if [ ! -s release.md ]; then
            echo "Release notes generation produced empty output" >&2
            echo "Response:" >&2
            cat response.json >&2
            exit 1
          fi

          if ! grep -qF "$COMPARE_URL" release.md; then
            printf "\n\nFull Changelog: %s\n" "$COMPARE_URL" >> release.md
          fi

      - name: Preserve silent-update marker (tag annotation or existing release body)
        shell: bash
        env:
          TAG: ${{ steps.tag.outputs.tag }}
          GH_TOKEN: ${{ github.token }}
        run: |
          # Permissive form for DETECTING intent to be silent (tag annotation or
          # existing body may carry the marker bare or as a comment).
          MARKER_RE='(avibe|vibe-remote):update-notification[[:space:]]*=[[:space:]]*none'
          # Strict HTML-comment form — this is the ONLY shape clients actually
          # parse (core/update_checker.py). Use it for the idempotence check so a
          # mere prose/inline-code mention of the marker (e.g. a release ABOUT
          # this workflow) does not trick us into skipping the real comment.
          MARKER_COMMENT_RE='<!--[[:space:]]*(avibe|vibe-remote):update-notification[[:space:]]*=[[:space:]]*none[[:space:]]*-->'
          has_marker="false"

          # Source 1: the tag annotation (annotated-tag release flow).
          TAG_MSG=$(git tag -l --format='%(contents)' "$TAG")
          if echo "$TAG_MSG" | grep -qE "$MARKER_RE"; then
            echo "Silent update marker found in tag annotation."
            has_marker="true"
          fi

          # Source 2: an already-created release body. A silent release is often
          # set up by pre-creating the release with the marker comment in its body
          # (e.g. via 'gh release create --notes-file'). Both this job (official
          # tags) and the later softprops step (gh-v* tags) replace the body with
          # release.md, which would otherwise STRIP that marker — so this applies
          # to ALL tags, not just official ones. Require the STRICT HTML-comment
          # form here: a body that merely DOCUMENTS the marker text as prose
          # (e.g. notes about this workflow) is not an intent to go silent.
          if [ "$has_marker" != "true" ]; then
            EXISTING_BODY=$(gh release view "$TAG" --repo "${GITHUB_REPOSITORY}" --json body --jq '.body' 2>/dev/null || true)
            if echo "$EXISTING_BODY" | grep -qE "$MARKER_COMMENT_RE"; then
              echo "Silent update marker (HTML comment) found in the existing release body."
              has_marker="true"
            fi
          fi

          # Prepend once (idempotent — never double-add if the notes already carry it).
          # Emit BOTH the current and legacy markers: the release body is read by
          # already-installed updaters, and a pre-rebrand client only understands
          # the legacy 'vibe-remote' marker — dropping it would notify exactly the
          # old-version users a silent release is meant not to disturb.
          if [ "$has_marker" = "true" ] && ! grep -qE "$MARKER_COMMENT_RE" release.md; then
            echo "Prepending silent-update markers (current + legacy) to the generated release notes."
            { printf '<!-- avibe:update-notification=none -->\n<!-- vibe-remote:update-notification=none -->\n\n'; cat release.md; } > release.md.tmp
            mv release.md.tmp release.md
          fi

      - name: Download release artifacts
        uses: actions/download-artifact@v6
        with:
          name: release-dist
          path: dist/

      - name: Create GitHub-only Release
        if: startsWith(steps.tag.outputs.tag, 'gh-v')
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          body_path: release.md
          files: dist/*
          fail_on_unmatched_files: true
          draft: false
          prerelease: ${{ steps.release_type.outputs.prerelease == 'true' }}
          make_latest: ${{ github.event_name == 'push' && steps.release_type.outputs.prerelease != 'true' }}

      - name: Update official release notes
        if: ${{ !startsWith(steps.tag.outputs.tag, 'gh-v') }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          if ! gh release view "$TAG" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            ARGS=(release create "$TAG" --repo "${GITHUB_REPOSITORY}" --title "$TAG" --notes-file release.md)
            if [ "${{ steps.release_type.outputs.prerelease }}" = "true" ]; then
              ARGS+=(--prerelease)
            fi
            if [ "${{ github.event_name }}" = "push" ] && [ "${{ steps.release_type.outputs.prerelease }}" != "true" ]; then
              ARGS+=(--latest)
            fi
            gh "${ARGS[@]}" || gh release edit "$TAG" --repo "${GITHUB_REPOSITORY}" --notes-file release.md
          else
            EDIT_ARGS=(release edit "$TAG" --repo "${GITHUB_REPOSITORY}" --title "$TAG" --notes-file release.md)
            if [ "${{ steps.release_type.outputs.prerelease }}" = "true" ]; then
              EDIT_ARGS+=(--prerelease)
            else
              EDIT_ARGS+=(--prerelease=false)
            fi
            if [ "${{ github.event_name }}" = "push" ] && [ "${{ steps.release_type.outputs.prerelease }}" != "true" ]; then
              EDIT_ARGS+=(--latest)
            fi
            gh "${EDIT_ARGS[@]}"
          fi
