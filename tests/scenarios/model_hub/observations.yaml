      - MH-RES-001
  - id: MH-OBS-003
    source: engine-survey-s1
    summary: OAuth presentation is runtime-declared rather than inferred from a vendor table.
    affects:
      - MH-OAUTH-A-001
      - MH-OAUTH-B-001
      - MH-OAUTH-C-001
