version: 1
capability:
  id: auth_setup
  name: IM-driven backend auth recovery
  canonical_tests:
    - tests/scenarios/auth_setup/test_auth_setup_scenarios.py
    - tests/test_claude_agent_sessions.py
  shared_harness:
    - tests/scenario_harness/core.py
    - tests/scenario_harness/auth_setup.py
status_legend:
  covered: scenario coverage exists
  partial: unit or contract coverage exists but the closed loop is incomplete
  manual: currently validated only by human regression
  gap: not covered yet
scenarios:
  - id: AUTH-SETUP-001
    name: Codex device auth happy path
    status: covered
    kind: happy_path
    layer: scenario
    backend: codex
    test: tests/scenarios/auth_setup/test_auth_setup_scenarios.py::test_codex_device_auth_scenario_reaches_terminal_success
  - id: AUTH-SETUP-002
    name: Claude manual callback happy path
    status: covered
    kind: happy_path
    layer: scenario
    backend: claude
    test: tests/scenarios/auth_setup/test_auth_setup_scenarios.py::test_claude_manual_callback_scenario_accepts_plain_reply_and_completes
  - id: AUTH-SETUP-003
    name: OpenCode direct key happy path
    status: covered
    kind: happy_path
    layer: scenario
    backend: opencode
    test: tests/scenarios/auth_setup/test_auth_setup_scenarios.py::test_opencode_direct_key_scenario_installs_key_and_refreshes_runtime
  - id: AUTH-SETUP-101
    name: OpenCode plain chat is ignored while waiting for a credential
    status: covered
    kind: negative_path
    layer: scenario
    backend: opencode
    test: tests/scenarios/auth_setup/test_auth_setup_scenarios.py::test_opencode_waiting_key_scenario_ignores_plain_chat
